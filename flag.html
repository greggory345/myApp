!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nigeria flag</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      font-family: system-ui, sans-serif;
    }

    .flag {
      width: min(90vw, 540px);
      aspect-ratio: 2 / 1;
      display: flex;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      border-radius: 2px;
      overflow: hidden;
    }

    .stripe {
      flex: 1;
    }

    .stripe--green {
      background: #008751;
    }

    .stripe--white {
      background: #ffffff;
    }
  </style>
  </head>
<body>
  <div class="flag" role="img" aria-label="Flag of Nigeria: three vertical stripes green, white, green">
    <div class="stripe stripe--green"></div>
    <div class="stripe stripe--white"></div>
    <div class="stripe stripe--green"></div>
  </div>
</body>
</html>
